services:
  php-backend:
    image: php:8.2-apache
    volumes:
      - ./:/var/www/html
    ports:
      - "8000:80"
    command: >
      bash -c "
      a2enmod rewrite &&
      apache2-foreground
      "

  vite-frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://php-backend
    command: bash -c "npm install && npm run dev -- --host"
